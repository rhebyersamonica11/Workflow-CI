name: CI & Docker Build
on: [push]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and Push
        run: |
          # Perintah ini sekarang akan mencari Dockerfile di folder MLProject
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest MLProject/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest