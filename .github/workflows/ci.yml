name: CI & Docker Build
on: [push]

jobs:
  train-and-build: # Satu job yang mencakup semua tahap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. Kriteria BASIC: Training Otomatis
      - name: Run training
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python modelling_tuning.py

      # 2. Kriteria SKILLED: Upload Artifacts
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-training-mlflow
          path: |
            mlruns/
            *.txt
            *.png

      # 3. Kriteria ADVANCED: Build & Push Docker
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest MLProject/
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest