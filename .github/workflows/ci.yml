name: CI/CD Pipeline

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        # Kita pindah ke folder Membangun_model dulu baru install
        run: |
          cd Membangun_model
          pip install -r requirements.txt

      - name: Run training
        run: |
          cd Membangun_model
          python modelling_tuning.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-training-mlflow
          path: |
            Membangun_model/mlruns/
            Membangun_model/*.txt
            Membangun_model/*.png

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest -f Workflow_CI/Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest