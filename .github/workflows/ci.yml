name: CI/CD Pipeline

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run training
        env:
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
        run: python modelling_tuning.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-training-mlflow
          path: |
            mlruns/
            *.txt
            *.png

      # --- DIAGNOSA: Memastikan lokasi Dockerfile ---
      - name: Verify Dockerfile location
        run: find . -name "Dockerfile"

      # --- PERBAIKAN: Login & Build Docker ---
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        run: |
          # Berpindah ke folder MLProject agar konteks build benar
          cd MLProject
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest