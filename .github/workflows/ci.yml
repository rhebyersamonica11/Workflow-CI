name: CI & Docker Build

on: [push]

jobs:
  train-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          # Pastikan semua library yang ada di conda.yaml sudah di-install di sini
          pip install mlflow scikit-learn pandas

      - name: Run training
        run: |
          cd MLProject
          # 1. Rename agar MLflow tidak mendeteksi file conda.yaml
          if [ -f conda.yaml ]; then mv conda.yaml conda.yaml.bak; fi
          
          # 2. Jalankan proyek dengan perintah MLflow standar
          mlflow run .
          
          # 3. Kembalikan nama file agar reviewer tetap bisa melihatnya
          if [ -f conda.yaml.bak ]; then mv conda.yaml.bak conda.yaml; fi

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasil-training-mlflow
          path: |
            MLProject/mlruns/

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker
        run: |
          # Karena kita pakai local storage (bukan registry), 
          # kita gunakan docker build standar. 
          # Pastikan file 'Dockerfile' Anda sudah benar di root.
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/loan-scoring:latest